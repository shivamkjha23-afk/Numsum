name: Deploy Firestore

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Firestore resources to deploy
        required: true
        default: rules,indexes
        type: choice
        options:
          - rules,indexes
          - rules
          - indexes
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firestore.indexes.json
      - firebase.json
      - .github/workflows/deploy-firestore.yml

jobs:
  deploy-firestore:
    name: Deploy Firestore rules and indexes
    runs-on: ubuntu-latest

    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_CLOUD_PROJECT: ${{ vars.FIREBASE_PROJECT_ID }}
      GCLOUD_PROJECT: ${{ vars.FIREBASE_PROJECT_ID }}
      DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'rules,indexes' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install --no-audit --no-fund --no-save firebase-tools

      - name: Prepare Firebase service account
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_ID="$(printf '%s' "$FIREBASE_PROJECT_ID" | tr -d '\r\n' | xargs)"
          SERVICE_ACCOUNT_FILE="${RUNNER_TEMP}/firebase-service-account.json"

          if [ -z "$PROJECT_ID" ]; then
            echo "FIREBASE_PROJECT_ID repository variable is required." >&2
            exit 1
          fi

          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON repository secret is required." >&2
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$SERVICE_ACCOUNT_FILE"

          if ! node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$SERVICE_ACCOUNT_FILE" 2>/dev/null; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" | base64 --decode > "$SERVICE_ACCOUNT_FILE"
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$SERVICE_ACCOUNT_FILE"
          fi

          {
            echo "GOOGLE_APPLICATION_CREDENTIALS=$SERVICE_ACCOUNT_FILE"
            echo "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
            echo "GCLOUD_PROJECT=$PROJECT_ID"
          } >> "$GITHUB_ENV"

      - name: Verify Firebase authentication
        shell: bash
        run: npx firebase-tools projects:list --json --non-interactive >/dev/null

      - name: Deploy Firestore rules and indexes
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_ID="$(printf '%s' "$FIREBASE_PROJECT_ID" | tr -d '\r\n' | xargs)"

          case "$DEPLOY_TARGET" in
            rules,indexes)
              FIREBASE_ONLY="firestore:rules,firestore:indexes"
              ;;
            rules)
              FIREBASE_ONLY="firestore:rules"
              ;;
            indexes)
              FIREBASE_ONLY="firestore:indexes"
              ;;
            *)
              echo "Unsupported deploy target: $DEPLOY_TARGET" >&2
              exit 1
              ;;
          esac

          npx firebase-tools deploy --only "$FIREBASE_ONLY" --project "$PROJECT_ID" --non-interactive
