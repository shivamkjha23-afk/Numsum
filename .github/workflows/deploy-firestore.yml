name: Deploy Firestore

on:
  workflow_dispatch:

jobs:
  deploy-firestore:
    name: Deploy Firestore rules and indexes
    runs-on: ubuntu-latest

    env:
      FIREBASE_PROJECT_ID: "${{ vars.FIREBASE_PROJECT_ID }}"
      FIREBASE_SERVICE_ACCOUNT_JSON: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install project dependencies
        run: npm install --no-audit --no-fund

      - name: Install Firebase CLI
        run: npm install --no-audit --no-fund --no-save firebase-tools

      - name: Validate deployment inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FIREBASE_PROJECT_ID:-}" ]; then
            echo "FIREBASE_PROJECT_ID repository variable is required."
            exit 1
          fi

          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON repository secret is required."
            exit 1
          fi

      - name: Deploy Firestore rules and indexes
        shell: bash
        run: |
          set -euo pipefail

          SERVICE_ACCOUNT_FILE="${RUNNER_TEMP}/firebase-service-account.json"

          cleanup() {
            rm -f "$SERVICE_ACCOUNT_FILE"
          }

          trap cleanup EXIT

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"

          npx firebase-tools deploy --only firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive
